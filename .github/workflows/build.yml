name: build-binaries
on:
  workflow_dispatch:

permissions:
  contents: write

# Her job kendi zip'ini DOGRUDAN binaries-v1 release'ine yukler; biri digerini beklemez.
jobs:
  win-cuda:
    # windows-2022 = VS 2022 (CUDA 12.8 resmi destekler). windows-latest VS 2026 tasiyor -> nvcc reddeder.
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Install CUDA 12.8
        uses: Jimver/cuda-toolkit@v0.2.21
        with:
          cuda: '12.8.0'
          method: network
          sub-packages: '["nvcc","cudart","cublas","cublas_dev"]'
      - name: Install Ninja
        run: choco install ninja -y --no-progress
      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
      - name: Build
        shell: pwsh
        run: ./scripts/ci-build-win.ps1
      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: binaries-v1
          files: llama-turboquant-win-cuda.zip

  mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/ci-build-mac.sh arm64
      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: binaries-v1
          files: llama-turboquant-mac-arm64.zip

  mac-x64:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/ci-build-mac.sh x64
      - name: Publish to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: binaries-v1
          files: llama-turboquant-mac-x64.zip
